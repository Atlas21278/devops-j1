all:
  children:
    my_infra:
      hosts:
        app-dev:
          ansible_host: localhost
          ansible_port: 2222
        app-prod1:
          ansible_host: localhost
          ansible_port: 2200
      vars:
        ansible_user: admin
        ansible_ssh_private_key_file: /root/.ssh/id-rda-infra.key
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        ansible_become: true
